name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update module.json for release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg version "$VERSION" \
             --arg download "https://github.com/Hamilcarbarcas/pf1-save-helper/releases/download/v${VERSION}/pf1-save-helper.zip" \
             '.version = $version | .download = $download' \
             module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create zip
        run: zip -r pf1-new-script-hooks.zip module.json scripts/ LICENSE README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pf1-new-script-hooks.zip
            module.json
          generate_release_notes: true
